document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +

            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +

            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%}\n  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#f3f1ec;color:#232320;-webkit-font-smoothing:antialiased}\n  input,button,select{font-family:inherit}\n  input:focus,select:focus{outline:none}\n  input::placeholder{color:#a6a39a}\n  ::-webkit-scrollbar{height:10px;width:10px}\n  ::-webkit-scrollbar-thumb{background:#d8d3c8;border-radius:6px;border:2px solid #f3f1ec}\n  @keyframes ovfade{from{opacity:0}to{opacity:1}}\n  @keyframes modup{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 50% -10%, #e9e4d7 0%, #f3f1ec 60%)\">\n  <div style=\"width:100%;max-width:400px\">\n    <div style=\"display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:30px\">\n      <div style=\"width:38px;height:38px;border-radius:11px;background:#3f6b4f;display:flex;align-items:center;justify-content:center\">\n        <div style=\"width:17px;height:3px;background:#fff;border-radius:2px;transform:rotate(-32deg)\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:700;letter-spacing:-.02em\">Závora<span style=\"color:#9a9588;font-weight:500\">·správa<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #e7e3da;border-radius:18px;padding:32px 30px;box-shadow:0 20px 50px -28px rgba(54,52,42,.4)\">\n      <h1 style=\"font-size:21px;font-weight:700;letter-spacing:-.02em;margin-bottom:5px\">Přihlášení<\u002Fh1>\n      <p style=\"font-size:14px;color:#76746c;margin-bottom:24px\">Zadejte své přihlašovací údaje.<\u002Fp>\n      <label style=\"display:block;font-size:13px;font-weight:600;color:#52504a;margin-bottom:7px\">Uživatelské jméno<\u002Flabel>\n      <input value=\"{{ loginName }}\" onchange=\"{{ onLoginName }}\" placeholder=\"jmeno.prijmeni\" style=\"width:100%;height:44px;padding:0 14px;border:1px solid #e0dccf;border-radius:11px;font-size:15px;background:#faf9f5;margin-bottom:16px\" style-focus=\"width:100%;height:44px;padding:0 14px;border:1px solid #3f6b4f;border-radius:11px;font-size:15px;background:#fff;margin-bottom:16px;box-shadow:0 0 0 3px rgba(63,107,79,.12)\">\n      <label style=\"display:block;font-size:13px;font-weight:600;color:#52504a;margin-bottom:7px\">Heslo<\u002Flabel>\n      <input type=\"password\" value=\"{{ loginPass }}\" onchange=\"{{ onLoginPass }}\" onkeydown=\"{{ onLoginKey }}\" placeholder=\"••••••••\" style=\"width:100%;height:44px;padding:0 14px;border:1px solid #e0dccf;border-radius:11px;font-size:15px;background:#faf9f5;margin-bottom:8px\" style-focus=\"width:100%;height:44px;padding:0 14px;border:1px solid #3f6b4f;border-radius:11px;font-size:15px;background:#fff;margin-bottom:8px;box-shadow:0 0 0 3px rgba(63,107,79,.12)\">\n      <sc-if value=\"{{ loginError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13px;color:#b4472d;margin-bottom:8px\">Zadejte uživatelské jméno i heslo.<\u002Fdiv>\n      <\u002Fsc-if>\n      <button onclick=\"{{ doLogin }}\" style=\"width:100%;height:46px;margin-top:14px;background:#3f6b4f;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:-.01em\" style-hover=\"width:100%;height:46px;margin-top:14px;background:#355a43;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:-.01em\">Přihlásit se<\u002Fbutton>\n    <\u002Fdiv>\n    <p style=\"text-align:center;font-size:12.5px;color:#a6a39a;margin-top:18px\">Demo · zadejte libovolné jméno a heslo<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n  <header style=\"background:#fff;border-bottom:1px solid #e7e3da;position:sticky;top:0;z-index:20\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 22px;height:62px;display:flex;align-items:center;gap:18px\">\n      <div style=\"display:flex;align-items:center;gap:10px;flex:none\">\n        <div style=\"width:30px;height:30px;border-radius:9px;background:{{ accent }};display:flex;align-items:center;justify-content:center\">\n          <div style=\"width:14px;height:2.5px;background:#fff;border-radius:2px;transform:rotate(-32deg)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:16px;font-weight:700;letter-spacing:-.02em\">Závora<\u002Fdiv>\n      <\u002Fdiv>\n      <nav style=\"display:flex;gap:4px;background:#f0eee7;padding:4px;border-radius:11px;margin-left:6px\">\n        <button onclick=\"{{ goCards }}\" style=\"{{ tabCardsStyle }}\">Karty<\u002Fbutton>\n        <button onclick=\"{{ goLog }}\" style=\"{{ tabLogStyle }}\">Log průjezdů<\u002Fbutton>\n      <\u002Fnav>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;flex:none\">\n        <div style=\"display:flex;align-items:center;gap:9px\">\n          <div style=\"width:32px;height:32px;border-radius:50%;background:#e7e3da;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#52504a\">{{ userInitials }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;font-weight:600;line-height:1.1\">{{ userName }}<div style=\"font-size:11.5px;color:#9a9588;font-weight:500\">Správce<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ doLogout }}\" title=\"Odhlásit se\" style=\"height:34px;padding:0 13px;background:#fff;border:1px solid #e0dccf;border-radius:9px;font-size:13px;font-weight:600;color:#52504a;cursor:pointer\" style-hover=\"height:34px;padding:0 13px;background:#f7f5f0;border:1px solid #d8d3c8;border-radius:9px;font-size:13px;font-weight:600;color:#232320;cursor:pointer\">Odhlásit<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"flex:1;max-width:1240px;width:100%;margin:0 auto;padding:26px 22px 48px\">\n\n    <sc-if value=\"{{ isCardsTab }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px\">\n        <div>\n          <h1 style=\"font-size:24px;font-weight:700;letter-spacing:-.025em\">Parkovací karty<\u002Fh1>\n          <p style=\"font-size:14px;color:#76746c;margin-top:3px\">{{ cardCountLabel }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <div style=\"position:relative\">\n            <input value=\"{{ cardSearch }}\" onchange=\"{{ onCardSearch }}\" placeholder=\"Hledat kartu, držitele, firmu…\" style=\"width:260px;max-width:60vw;height:40px;padding:0 14px 0 36px;border:1px solid #e0dccf;border-radius:10px;font-size:14px;background:#fff\" style-focus=\"width:260px;max-width:60vw;height:40px;padding:0 14px 0 36px;border:1px solid #3f6b4f;border-radius:10px;font-size:14px;background:#fff;box-shadow:0 0 0 3px rgba(63,107,79,.1)\">\n            <div style=\"position:absolute;left:13px;top:50%;transform:translateY(-50%);width:13px;height:13px;border:2px solid #b3afa4;border-radius:50%\"><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ openNewCard }}\" style=\"height:40px;padding:0 16px;background:{{ accent }};color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap\">＋ Přidat kartu<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e7e3da;border-radius:16px;overflow:hidden\">\n        <div style=\"overflow-x:auto\">{{ cardTableEl }}<\u002Fdiv>\n        <sc-if value=\"{{ cardsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:44px;text-align:center;color:#9a9588;font-size:14px\">Žádná karta neodpovídá hledání.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isLogTab }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"font-size:24px;font-weight:700;letter-spacing:-.025em\">Log průjezdů<\u002Fh1>\n        <p style=\"font-size:14px;color:#76746c;margin-top:3px\">{{ logCountLabel }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center\">\n        <div style=\"position:relative\">\n          <input value=\"{{ logSearch }}\" onchange=\"{{ onLogSearch }}\" placeholder=\"Hledat držitele nebo kartu…\" style=\"width:240px;max-width:60vw;height:40px;padding:0 14px 0 36px;border:1px solid #e0dccf;border-radius:10px;font-size:14px;background:#fff\" style-focus=\"width:240px;max-width:60vw;height:40px;padding:0 14px 0 36px;border:1px solid #3f6b4f;border-radius:10px;font-size:14px;background:#fff;box-shadow:0 0 0 3px rgba(63,107,79,.1)\">\n          <div style=\"position:absolute;left:13px;top:50%;transform:translateY(-50%);width:13px;height:13px;border:2px solid #b3afa4;border-radius:50%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;background:#f0eee7;padding:4px;border-radius:10px\">\n          <button onclick=\"{{ setStatusAll }}\" style=\"{{ stAllStyle }}\">Vše<\u002Fbutton>\n          <button onclick=\"{{ setStatusAllowed }}\" style=\"{{ stAllowedStyle }}\">Povolené<\u002Fbutton>\n          <button onclick=\"{{ setStatusDenied }}\" style=\"{{ stDeniedStyle }}\">Zamítnuté<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;background:#f0eee7;padding:4px;border-radius:10px\">\n          <button onclick=\"{{ setBarAll }}\" style=\"{{ brAllStyle }}\">Obě závory<\u002Fbutton>\n          <button onclick=\"{{ setBarOne }}\" st dSearch: '',\n    logSearch: '',\n    logStatus: 'all',\n    logBarrier: 'all',\n    sortKey: 'date',\n    sortDir: 'desc',\n    editing: null,\n    isNew: false,\n    fError: false,\n    nextId: 100,\n    cards: [\n      { id: 1, cardNumber: '1042', holder: 'Jan Novák', company: 'IT oddělení', unlimited: true, validFrom: '', validTo: '', barriers: 'one', enabled: true, note: '' },\n      { id: 2, cardNumber: '1043', holder: 'Petra Svobodová', company: 'Vedení společnosti', unlimited: true, validFrom: '', validTo: '', barriers: 'both', enabled: true, note: 'Trvalý přístup do celého areálu.' },\n      { id: 3, cardNumber: '2201', holder: 'HZS – výjezdové vozidlo', company: 'Hasičský záchranný sbor', unlimited: true, validFrom: '', validTo: '', barriers: 'both', enabled: true, note: 'Otevírá obě závory pro rychlý průjezd.' },\n      { id: 4, cardNumber: '3310', holder: 'Martin Dvořák', company: 'Logistika', unlimited: false, validFrom: '2026-06-01', validTo: '2026-06-30', barriers: 'one', enabled: true, note: '' },\n      { id: 5, cardNumber: '5567', holder: 'Návštěva – Siemens s.r.o.', company: 'Externí návštěva', unlimited: false, validFrom: '2026-06-23', validTo: '2026-06-23', barriers: 'one', enabled: true, note: 'Jednodenní návštěva, schůzka na výrobě.' },\n      { id: 6, cardNumber: '4412', holder: 'Eva Horáková', company: 'Účetnictví', unlimited: true, validFrom: '', validTo: '', barriers: 'one', enabled: false, note: 'Dočasně zablokováno – ztráta karty.' },\n      { id: 7, cardNumber: '7788', holder: 'Tomáš Procházka', company: 'Údržba', unlimited: true, validFrom: '', validTo: '', barriers: 'both', enabled: true, note: '' },\n      { id: 8, cardNumber: '9001', holder: 'Lucie Němcová', company: 'Personální oddělení', unlimited: true, validFrom: '', validTo: '', barriers: 'one', enabled: true, note: '' },\n    ],\n    log: [\n      { id: 1, ts: '2026-06-23T08:02', holder: 'Jan Novák', cardNumber: '1042', allowed: true, barrier: 'one' },\n      { id: 2, ts: '202
